openapi: 3.1.0
info:
  title: Property Management REST API
  description: |
    # Overview
       These APIs facilitate managing property configurations and units management for a venue.
  license:
    name: RUCKUS Cloud Privacy Policy
    url: https://support.ruckuswireless.com/ruckus-cloud-privacy-policy
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Generated server url
tags:
  - name: Units Identity API
    description: Manages linked identities for a unit.
  - name: Property Configuration
    description: Manages property configuration for venue
  - name: Units API
    description: Manages units for a venue
  - name: Resident Portals
    description: Manages, create and get configuration of resident portals for a tenant
  - name: Property Configuration
    description: Retrieves property configuration for a tenant
  - name: QoS Profile Assignment API
    description: Manages QoS profile assignments
paths:
  /venues/{venueId}/units/{unitId}/identities/{identityId}:
    put:
      tags:
        - Units Identity API
      summary: Associate Identity to Unit
      description: Allows the user to associate identities on the specified unit.
      operationId: associateIdentity
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: identityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
          headers:
            Location:
              description: Url for the added unit
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Persona'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Persona'
        '409':
          description: Conflict-The unit trying to add already exists
          headers:
            Location:
              description: Url of the existing unit
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Persona'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Persona'
    delete:
      tags:
        - Units Identity API
      summary: 'Delete Unit Identity '
      description: Allows the user to delete associated identity of the unit.
      operationId: deleteIdentity
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
        - name: unitId
          in: path
          description: Unit Id
          required: true
          schema:
            type: string
            format: uuid
        - name: identityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/units/qosProfileAssignments/{qosProfileId}:
    put:
      tags:
        - QoS Profile Assignment API
      summary: Update QoS Profile Assignment
      description: Allows the user to update QoS profile assignments.
      operationId: qosProfileAssignments
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: qosProfileId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: QoS profile assignment to assign
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QoSProfileAssignment'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/QoSProfileAssignment'
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            Location:
              description: Url for the activity status
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/propertyConfigs:
    get:
      tags:
        - Property Configuration
      summary: Get Property Configuration
      description: Gets property configuration for the requested venue Id.
      operationId: getProperty
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Ok
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/EntityModelPropertyDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelPropertyDto'
        '400':
          description: Bad request
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Not found
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    put:
      tags:
        - Property Configuration
      summary: Update Property Configuration
      description: >-
        Allows the user to enable or disable property management configuration
        on the specified venue.
      operationId: enableProperty
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Property configuration to enable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyDto'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/PropertyDto'
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            Location:
              description: Url for the enabled property configuration
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Property configuration not found for the given venue id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    patch:
      tags:
        - Property Configuration
      summary: Selectively Update Property Configuration
      description: >-
        Allows the user to selectively update property management configuration
        on the specified venue.
      operationId: enablePropertySelectively
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Property configuration to enable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyDto'
        required: true
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Property configuration not found for the given venue id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/propertyConfigs/residentPortalAssignments/{residentPortalId}:
    put:
      tags:
        - Property Configuration
      summary: Update Resident Portal Assignment
      description: Allows the user to assign resident portal for the specified venue.
      operationId: assignResidentPortal
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
        - name: residentPortalId
          in: path
          description: Resident PortalId Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResidentPortalAssignment'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PropertyResidentPortalAssignment'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Property configuration not found for the given venue id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/units:
    get:
      tags:
        - Units API
      summary: Gets Units for Venue
      description: Gets the list of units paged.
      operationId: getAllUnits
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            format: int32
        - name: page
          in: query
          description: The page to retrieve (starts at one).
          schema:
            type: integer
            format: int32
        - name: sort
          in: query
          description: >-
            The field name to sort, comma seperated from the sort order (asc or
            desc).
          schema:
            type: string
      responses:
        '200':
          description: Units for venue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          description: Invalid input supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    post:
      tags:
        - Units API
      summary: Adds Unit to Venue
      description: Allows the user to add a unit on the specified venue.
      operationId: addUnit
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Unit to add
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                unitImports:
                  type: string
                  format: binary
              required:
                - unitImports
          application/json:
            schema:
              $ref: '#/components/schemas/Unit'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/Unit'
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            Location:
              description: Url for the added unit
              style: simple
              schema:
                type: string
          content:
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '409':
          description: Conflict-The unit trying to add already exists
          headers:
            Location:
              description: Url of the existing unit
              style: simple
              schema:
                type: string
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '422':
          description: Unable to process the file
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
  /venues/{venueId}/units/query:
    post:
      tags:
        - Units API
      summary: Query Units for Venue
      description: Gets the list of units using the specified query.
      operationId: queryUnits
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: excludeContent
          in: query
          description: >-
            Indicates that the content should be excluded from the query and
            only count and size data returned.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        description: 'Data for the requested query '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryData'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/QueryData'
      responses:
        '200':
          description: Units for venue.
          content:
            text/csv: {}
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelUnit'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelUnit'
        '400':
          description: Invalid query data supplied.
          content:
            text/csv:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/hal+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PageEntityModelUnit'
                  - $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PageEntityModelUnit'
                  - $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/units/notifications:
    post:
      tags:
        - Units API
      summary: Gets Notifications for Units
      description: Allows the user to resend notifications for units with the given ids.
      operationId: resendNotifications
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Unit ids (maximum of 100) to send notifications
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
          application/vnd.ruckus.v1+json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        '200':
          description: Ok
        '400':
          description: Bad request
        '500':
          description: Internal server error
  /venues/{venueId}/units/identities/query:
    post:
      tags:
        - Units Identity API
      summary: Query Associated Identities for a Unit
      description: Gets the list of identities using the specified query.
      operationId: queryIdentities
      parameters:
        - name: excludeContent
          in: query
          description: >-
            Indicates that the content should be excluded from the query and
            only count and size data returned.
          required: false
          schema:
            type: boolean
            default: false
        - name: venueId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: 'Data for the requested query '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryData'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/QueryData'
      responses:
        '200':
          description: Identities for venue.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelPersona'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelPersona'
        '400':
          description: Invalid query data supplied.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/propertyConfigs/query:
    post:
      tags:
        - Property Configuration
      summary: Query Property Configurations
      description: Gets the list of property configurations using the specified query.
      operationId: queryPropertyConfigs
      parameters:
        - name: excludeContent
          in: query
          description: >-
            Indicates that the content should be excluded from the query and
            only count and size data returned.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        description: 'Data for the requested query '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryData'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/QueryData'
      responses:
        '200':
          description: Collection of property configurations.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Page'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          description: Invalid query data supplied.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /residentPortals:
    post:
      tags:
        - Resident Portals
      summary: Adds Resident Portal
      description: Allows the user to add a resident portal.
      operationId: addResidentPortal
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                portal:
                  $ref: '#/components/schemas/ResidentPortal'
                logo:
                  type: string
                  format: binary
                  description: Portal logo image
                favIcon:
                  type: string
                  format: binary
                  description: Portal fav icon image
              required:
                - portal
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: Url for the added resident portal
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '409':
          description: Conflict-The resident portal trying to add already exists
          headers:
            Location:
              description: Url of the existing resident portal
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /residentPortals/query:
    post:
      tags:
        - Resident Portals
      summary: Query Resident Portals
      description: Gets the list of resident portals using the specified query.
      operationId: queryResidentPortals
      parameters:
        - name: excludeContent
          in: query
          description: >-
            Indicates that the content should be excluded from the query and
            only count and size data returned.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        description: 'Data for the requested query '
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryData'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/QueryData'
      responses:
        '200':
          description: Resident portal details.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelResidentPortal'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelResidentPortal'
        '400':
          description: Invalid query data supplied.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /venues/{venueId}/units/{unitId}:
    get:
      tags:
        - Units API
      summary: Gets Unit for Venue
      description: Allows the user to get a unit with the given id.
      operationId: fetchUnit
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
        - name: unitId
          in: path
          description: Unit Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/EntityModelUnit'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelUnit'
        '400':
          description: Bad request
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    delete:
      tags:
        - Units API
      summary: Delete Unit for Venue
      description: Allows the user to delete a unit with the given id.
      operationId: deleteUnit
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
        - name: unitId
          in: path
          description: Unit Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
