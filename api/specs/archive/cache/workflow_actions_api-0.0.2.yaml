openapi: 3.1.0
info:
  title: Workflow Actions REST API
  description: |-
    # Overview
       These APIs facilitate workflow actions management. Workflow actions are added as steps during workflow configuration.
    # RateLimit
       For the Workflow actions REST APIs the following will be true:
       Limits are applied to each property.
       A maximum of 60 calls can be made per second.
       Each second 30 calls will be returned to be used.
  license:
    name: RUCKUS Cloud Privacy Policy
    url: https://support.ruckuswireless.com/ruckus-cloud-privacy-policy
  version: 0.0.2
servers:
  - url: http://localhost:8080
    description: Generated server url
tags:
  - name: Enrollment Action API
    description: Manages enrollment actions
  - name: Enrollment Action Files API
    description: Manages enrollment action files
  - name: Enrollment Action Type API
    description: Manages enrollment actions for specific action types
paths:
  /enrollmentActions:
    get:
      tags:
        - Enrollment Action API
      summary: Get All Enrollment Actions Across Action Types
      description: Gets all enrollment actions across action types.
      operationId: getAllEnrollmentActions
      parameters:
        - name: size
          in: query
          description: >-
            Number of records in a page. Will be defaulted to 20 if not
            specified or found invalid.
          schema:
            type: integer
            format: int32
          example: 20
        - name: page
          in: query
          description: >-
            The page to retrieve (starts at zero). Will be defaulted to 0 if not
            specified or found invalid
          schema:
            type: integer
            format: int32
          example: 0
        - name: sort
          in: query
          description: >-
            The field names to sort with. Comma seperated from the sort order
            (asc or desc). Allowed values are name, description, actionType and
            version.
          schema:
            type: string
          example: actionType,name,asc
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    post:
      tags:
        - Enrollment Action API
      summary: Create Enrollment Action Across Action Types
      description: Allows user to create various enrollment actions across action types.
      operationId: createEnrollmentActions
      requestBody:
        content:
          application/json:
            schema:
              type: string
              description: >-
                Choose appropriate request body from below to configure
                different  action types
              oneOf:
                - $ref: '#/components/schemas/ActionDto'
                - $ref: '#/components/schemas/AupActionDto'
                - $ref: '#/components/schemas/DataPromptActionDto'
                - $ref: '#/components/schemas/UserSplitActionDto'
                - $ref: '#/components/schemas/DisplayMessageActionDto'
                - $ref: '#/components/schemas/DpskActionDto'
                - $ref: '#/components/schemas/MacRegistrationActionDto'
                - $ref: '#/components/schemas/UserSplitOptionActionDto'
          application/vnd.ruckus.v1+json:
            schema:
              type: string
              description: >-
                Choose appropriate request body from below to configure
                different  action types
              oneOf:
                - $ref: '#/components/schemas/ActionDto'
                - $ref: '#/components/schemas/AupActionDto'
                - $ref: '#/components/schemas/DataPromptActionDto'
                - $ref: '#/components/schemas/UserSplitActionDto'
                - $ref: '#/components/schemas/DisplayMessageActionDto'
                - $ref: '#/components/schemas/DpskActionDto'
                - $ref: '#/components/schemas/MacRegistrationActionDto'
                - $ref: '#/components/schemas/UserSplitOptionActionDto'
        required: true
      responses:
        '202':
          description: Accepted
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /enrollmentActions/query:
    post:
      tags:
        - Enrollment Action API
      summary: Query Enrollment Actions Across Action Types
      description: Gets the list of enrollment actions using the specified query.
      operationId: queryEnrollmentActions
      requestBody:
        description: Search criteria and pagination details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionQueryCriteria'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/ActionQueryCriteria'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
        '400':
          description: Invalid query data supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /enrollmentActions/files:
    post:
      tags:
        - Enrollment Action Files API
      summary: Upload File
      description: Allows user to upload file.
      operationId: uploadFile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                fileDetails:
                  $ref: '#/components/schemas/FileUploadDto'
                fileToUpload:
                  type: string
                  format: binary
                  description: File to be uploaded
              required:
                - fileDetails
                - fileToUpload
          multipart/vnd.ruckus.v1+form-data:
            schema:
              type: object
              properties:
                fileDetails:
                  $ref: '#/components/schemas/FileUploadDto'
                fileToUpload:
                  type: string
                  format: binary
                  description: File to be uploaded
              required:
                - fileDetails
                - fileToUpload
      responses:
        '200':
          description: Uploaded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponseDto'
        '201':
          description: Created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponseDto'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /enrollmentActions/{actionId}:
    get:
      tags:
        - Enrollment Action API
      summary: Get Enrollment Action Configuration for Specific Action Identifier
      description: >-
        Gets enrollment action configuration for the requested action
        identifier.
      operationId: getEnrollmentAction
      parameters:
        - name: actionId
          in: path
          description: Action Id
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityModelActionDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/EntityModelActionDto'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    delete:
      tags:
        - Enrollment Action API
      summary: Delete Specific Enrollment Actions
      description: Allows the user to delete enrollment action with the given id.
      operationId: deleteEnrollmentActions
      parameters:
        - name: actionId
          in: path
          description: Action Id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '204':
          description: No Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    patch:
      tags:
        - Enrollment Action API
      summary: Selectively Updates Enrollment Actions
      description: Allows the user to selectively update enrollment actions.
      operationId: editEnrollmentActions
      parameters:
        - name: actionId
          in: path
          description: Action Id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Fields in enrollment actions to edit
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/vnd.ruckus.v1+json:
            schema:
              type: object
              additionalProperties: {}
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            Location:
              description: Updated enrollment action
              style: simple
              schema:
                type: string
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '204':
          description: No Content
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/EntityModelAcceptedResponse'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /enrollmentActions/files/{fileId}:
    get:
      tags:
        - Enrollment Action Files API
      summary: Get Signed URL for Download
      description: Get signed URL for download.
      operationId: getSignedUrlForDownload
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileResponseDto'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
    delete:
      tags:
        - Enrollment Action Files API
      summary: Delete File
      description: Delete file.
      operationId: DeleteFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '204':
          description: No Content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
  /enrollmentActions/actionTypes/{actionType}:
    get:
      tags:
        - Enrollment Action Type API
      summary: Get All Enrollment Action Configuration for Specific Action Type
      description: Gets all enrollment action configurations for a specific action type.
      operationId: getAllEnrollmentActionByType
      parameters:
        - name: size
          in: query
          description: >-
            Number of records in a page. Will be defaulted to 20 if not
            specified or found invalid.
          schema:
            type: integer
            format: int32
          example: 20
        - name: page
          in: query
          description: >-
            The page to retrieve (starts at zero). Will be defaulted to 0 if not
            specified or found invalid
          schema:
            type: integer
            format: int32
          example: 0
        - name: sort
          in: query
          description: >-
            The field names to sort with. Comma seperated from the sort order
            (asc or desc).
          schema:
            type: string
          example: name,description,asc
        - name: actionType
          in: path
          description: Action Type
          required: true
          schema:
            type: string
            enum:
              - AUP
              - DATA_PROMPT
              - DPSK
              - USER_SELECTION_SPLIT
              - USER_SELECTION_SPLIT_OPTION
              - AUTO_SELECTION_SPLIT
              - DISPLAY_MESSAGE
              - MAC_REG
              - CERT_TEMPLATE
              - IDP_AUTH_PROVIDER
              - LDAP_AUTH_PROVIDER
              - PASSPHRASE
              - CAPTIVE_PORTAL
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelActionDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
components:
  schemas:
    ActionDto:
      type: object
      discriminator:
        propertyName: actionType
      properties:
        name:
          type: string
          description: Action name.
          maxLength: 100
          minLength: 2
        description:
          type: string
          description: Action description.
          maxLength: 1000
          minLength: 0
        actionType:
          type: string
          description: Action type.
          enum:
            - AUP
            - DATA_PROMPT
            - DPSK
            - USER_SELECTION_SPLIT
            - USER_SELECTION_SPLIT_OPTION
            - AUTO_SELECTION_SPLIT
            - DISPLAY_MESSAGE
            - MAC_REG
            - CERT_TEMPLATE
            - IDP_AUTH_PROVIDER
            - LDAP_AUTH_PROVIDER
            - PASSPHRASE
            - CAPTIVE_PORTAL
        id:
          type: string
          format: uuid
          description: Action identifier.
        parentActionId:
          type: string
          format: uuid
          description: Parent action identifier.
        version:
          type: integer
          format: int32
          description: Version.
        valid:
          type: boolean
          description: Validity flag.
          readOnly: true
      required:
        - actionType
        - name
    AupActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            title:
              type: string
              description: Title displayed during enrollment.
              maxLength: 100
              minLength: 1
            messageHtml:
              type: string
              description: Message displayed to user.
              maxLength: 1000
              minLength: 1
            bottomLabel:
              type: string
              description: Bottom label displayed to user.
              maxLength: 1000
              minLength: 0
            checkboxDefaultState:
              type: boolean
              description: Default state of the checkbox displayed to user.
            checkboxText:
              type: string
              description: Text label of the checkbox displayed to user.
              maxLength: 100
              minLength: 1
            checkboxHighlightColor:
              type: string
              description: Highlight colour of the checkbox displayed to user.
              minLength: 1
              pattern: ^$|^#(?:[0-9a-fA-F]{3}){1,2}$|^(?:[0-9a-fA-F]{3}){1,2}$
            backButtonText:
              type: string
              description: Text on the back button displayed to user.
              maxLength: 20
              minLength: 1
            continueButtonText:
              type: string
              description: Text on the continue button displayed to user.
              maxLength: 20
              minLength: 1
            useAupFile:
              type: boolean
              description: Whether to display user policy file.
            aupFileLocation:
              type: string
              description: User policy file storage location.
            aupPlainText:
              type: string
              description: User display content.
              maxLength: 1000
              minLength: 0
            aupFileName:
              type: string
              description: Aup file name.
              maxLength: 100
              minLength: 0
      description: 'Request for creating Acceptable User Policy action type : AUP.'
      required:
        - actionType
        - backButtonText
        - checkboxHighlightColor
        - checkboxText
        - continueButtonText
        - messageHtml
        - name
        - title
    DataPromptActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            title:
              type: string
              description: Title displayed during enrollment.
              maxLength: 100
              minLength: 2
            messageHtml:
              type: string
              description: Message displayed to user.
              maxLength: 1000
              minLength: 1
            displayMessageHtml:
              type: boolean
              description: Whether to display message in the form.
            displayTitle:
              type: boolean
              description: Whether to display title in the form.
            variables:
              type: array
              description: List of fields on the form displayed to user.
              items:
                $ref: '#/components/schemas/Variable'
              maxItems: 11
              minItems: 1
      description: 'Request for creating Data prompt action type : DATA_PROMPT.'
      required:
        - actionType
        - name
        - variables
    DisplayMessageActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            title:
              type: string
              description: Title displayed during enrollment.
              maxLength: 100
              minLength: 1
            messageHtml:
              type: string
              description: Message displayed to user.
              maxLength: 1000
              minLength: 1
            bottomLabel:
              type: string
              description: Bottom label displayed to user.
              maxLength: 1000
              minLength: 0
            backButtonText:
              type: string
              description: Text on the back button displayed to user.
              maxLength: 20
              minLength: 1
            continueButtonText:
              type: string
              description: Text on the continue button displayed to user.
              maxLength: 20
              minLength: 1
            displayBackButton:
              type: boolean
              description: Whether to display back button.
            displayContinueButton:
              type: boolean
              description: Whether to display continue button.
            killSession:
              type: boolean
              description: Whether to display terminate session.
      description: 'Request for creating Display Message action type : DISPLAY_MESSAGE.'
      required:
        - actionType
        - backButtonText
        - continueButtonText
        - messageHtml
        - name
        - title
    DpskActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            identityGroupId:
              type: string
              format: uuid
              description: Identity group identifier.
            identityId:
              type: string
              format: uuid
              description: Identity identifier.
            emailNotification:
              type: boolean
              description: Email notification required.
              readOnly: true
            smsNotification:
              type: boolean
              description: Text notification required.
              readOnly: true
            qrCodeDisplay:
              type: boolean
              description: Quick response code display required.
            dpskPoolId:
              type: string
              description: Dpsk pool identifier.
              readOnly: true
      description: 'Request for creating Acceptable User Policy action type : DPSK.'
      required:
        - actionType
        - identityGroupId
        - name
    MacRegistrationActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            identityGroupId:
              type: string
              format: uuid
              description: Identity group identifier.
            macRegListId:
              type: string
              description: MAC registration list identifier.
              readOnly: true
            identityId:
              type: string
              format: uuid
              description: Identity identifier.
      description: 'Request for creating MAC registration action type : MAC_REG.'
      required:
        - actionType
        - identityGroupId
        - name
    UserSplitActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            title:
              type: string
              description: Title displayed during enrollment.
            messageHtml:
              type: string
              description: Message displayed to user.
            displayMessageHtml:
              type: boolean
              description: Whether to display message in the form.
            displayTitle:
              type: boolean
              description: Whether to display title in the form.
      description: >-
        Request for creating User selection split action type :
        USER_SELECTION_SPLIT.
      required:
        - actionType
        - name
    UserSplitOptionActionDto:
      allOf:
        - $ref: '#/components/schemas/ActionDto'
        - type: object
          properties:
            title:
              type: string
              description: Title displayed during enrollment.
              maxLength: 100
              minLength: 0
            messageHtml:
              type: string
              description: Message displayed to user.
              maxLength: 1000
              minLength: 1
            shortName:
              type: string
              description: >-
                This is the short name. If a custom icon is not specified, this
                name is overlaid on the workflow's icon during the enrollment
                process.
              maxLength: 50
              minLength: 0
            iconFileLocation:
              type: string
              description: >-
                Icon file storage location.If not provided, the short name will
                not be overlaid.
              maxLength: 1000
              minLength: 0
      description: >-
        Request for creating User selection split action type :
        USER_SELECTION_SPLIT.
      required:
        - actionType
        - messageHtml
        - name
    Variable:
      type: object
      description: Fields to be presented to the user.
      properties:
        label:
          type: string
          description: Field label.
          maxLength: 100
          minLength: 1
        regex:
          type: string
          description: Field input pattern. This should be a valid regular expression.
          maxLength: 50
          minLength: 0
        type:
          type: string
          description: File type.
          enum:
            - USER_NAME
            - EMAIL
            - PHONE
            - FIRST_NAME
            - LAST_NAME
            - INPUT_FIELD_1
            - INPUT_FIELD_2
            - INPUT_FIELD_3
            - INPUT_FIELD_4
            - INPUT_FIELD_5
            - INPUT_FIELD_6
        position:
          type: integer
          format: int32
          description: Position in the form
      required:
        - label
        - type
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        reason:
          type: string
        suggestion:
          type: string
    ErrorResource:
      type: object
      properties:
        requestId:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
    AcceptedResponse:
      type: object
      properties:
        requestId:
          type: string
        id:
          type: string
          format: uuid
    ActionQueryCriteria:
      type: object
      properties:
        sortDirection:
          type: string
          description: Sort direction.
          enum:
            - ASC
            - DESC
        page:
          type: integer
          format: int32
          description: Page number. If not specified the first page will be returned.
        pageSize:
          type: integer
          format: int32
          description: >-
            Number of records in a page.If not specified default page size of 20
            will be applied.
        id:
          type: string
          format: uuid
          description: Action id.
        name:
          type: string
          description: Action name.
          maxLength: 100
          minLength: 0
        description:
          type: string
          description: Action description.
          maxLength: 1000
          minLength: 0
        actionType:
          type: string
          description: Action type.
          enum:
            - AUP
            - DATA_PROMPT
            - DPSK
            - USER_SELECTION_SPLIT
            - USER_SELECTION_SPLIT_OPTION
            - AUTO_SELECTION_SPLIT
            - DISPLAY_MESSAGE
            - MAC_REG
            - CERT_TEMPLATE
            - IDP_AUTH_PROVIDER
            - LDAP_AUTH_PROVIDER
            - PASSPHRASE
            - CAPTIVE_PORTAL
        version:
          type: string
          description: Version.
        parentActionId:
          type: string
          format: uuid
          description: Parent action identifier.
        sortFields:
          type: array
          description: Sort by
