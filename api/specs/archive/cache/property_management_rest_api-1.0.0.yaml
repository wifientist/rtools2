openapi: 3.1.0
info:
  title: Property Management REST API
  description: |
    # Overview
       These APIs facilitate managing property configurations and units management for a venue.
  license:
    name: RUCKUS Cloud Privacy Policy
    url: https://support.ruckuswireless.com/ruckus-cloud-privacy-policy
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Generated server url
tags:
  - name: Property Configuration
    description: Manages property configuration for venue
  - name: Units API
    description: Manages units for a venue
  - name: Resident Portals
    description: Manages, create and get configuration of resident portals for a tenant
  - name: Property Configuration
    description: Retrieves property configuration for a tenant
paths:
  /venues/{venueId}/units:
    delete:
      tags:
        - Units API
      summary: Delete Units for Venue
      description: Allows the user to delete units with the given ids.
      operationId: deleteUnits
      parameters:
        - name: venueId
          in: path
          description: Venue Id
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Unit ids to delete
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
          application/vnd.ruckus.v1+json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
      deprecated: true
  /residentPortals:
    get:
      tags:
        - Resident Portals
      summary: Get Resident Portals
      description: Gets the list of resident portals paged.
      operationId: getAllPortals
      parameters:
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            format: int32
        - name: page
          in: query
          description: The page to retrieve (starts at one).
          schema:
            type: integer
            format: int32
        - name: sort
          in: query
          description: >-
            The field name to sort, comma seperated from the sort order (asc or
            desc).
          schema:
            type: string
      responses:
        '200':
          description: Resident portal details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEntityModelResidentPortal'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelResidentPortal'
        '400':
          description: Invalid input supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
      deprecated: true
    delete:
      tags:
        - Resident Portals
      summary: Delete Resident Portals
      description: Allows the user to delete resident portals with the given ids.
      operationId: deleteResidentPortals
      requestBody:
        description: Resident portal ids to delete
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
        required: true
      responses:
        '200':
          description: Ok
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '500':
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResource'
      deprecated: true
  /venues/propertyConfigs:
    get:
      tags:
        - Property Configuration
      summary: Gets Property Configurations
      description: Gets the list of property configurations paged.
      operationId: getAllPropertyConfigs
      parameters:
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            format: int32
        - name: page
          in: query
          description: The page to retrieve (starts at one).
          schema:
            type: integer
            format: int32
        - name: sort
          in: query
          description: >-
            The field name to sort, comma seperated from the sort order (asc or
            desc).
          schema:
            type: string
      responses:
        '200':
          description: Property configurations.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelPropertyDto'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/PageEntityModelPropertyDto'
        '400':
          description: Invalid input supplied.
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
      deprecated: true
components:
  schemas:
    Persona:
      type: object
      properties:
        unitId:
          type: string
          format: uuid
        personaType:
          type: string
          enum:
            - UNIT
            - GUEST
            - LINKED
        personaId:
          type: string
          format: uuid
      required:
        - personaId
        - personaType
        - unitId
    ErrorResource:
      type: object
      properties:
        status:
          type: string
          enum:
            - 100 CONTINUE
            - 101 SWITCHING_PROTOCOLS
            - 102 PROCESSING
            - 103 EARLY_HINTS
            - 103 CHECKPOINT
            - 200 OK
            - 201 CREATED
            - 202 ACCEPTED
            - 203 NON_AUTHORITATIVE_INFORMATION
            - 204 NO_CONTENT
            - 205 RESET_CONTENT
            - 206 PARTIAL_CONTENT
            - 207 MULTI_STATUS
            - 208 ALREADY_REPORTED
            - 226 IM_USED
            - 300 MULTIPLE_CHOICES
            - 301 MOVED_PERMANENTLY
            - 302 FOUND
            - 302 MOVED_TEMPORARILY
            - 303 SEE_OTHER
            - 304 NOT_MODIFIED
            - 305 USE_PROXY
            - 307 TEMPORARY_REDIRECT
            - 308 PERMANENT_REDIRECT
            - 400 BAD_REQUEST
            - 401 UNAUTHORIZED
            - 402 PAYMENT_REQUIRED
            - 403 FORBIDDEN
            - 404 NOT_FOUND
            - 405 METHOD_NOT_ALLOWED
            - 406 NOT_ACCEPTABLE
            - 407 PROXY_AUTHENTICATION_REQUIRED
            - 408 REQUEST_TIMEOUT
            - 409 CONFLICT
            - 410 GONE
            - 411 LENGTH_REQUIRED
            - 412 PRECONDITION_FAILED
            - 413 PAYLOAD_TOO_LARGE
            - 413 REQUEST_ENTITY_TOO_LARGE
            - 414 URI_TOO_LONG
            - 414 REQUEST_URI_TOO_LONG
            - 415 UNSUPPORTED_MEDIA_TYPE
            - 416 REQUESTED_RANGE_NOT_SATISFIABLE
            - 417 EXPECTATION_FAILED
            - 418 I_AM_A_TEAPOT
            - 419 INSUFFICIENT_SPACE_ON_RESOURCE
            - 420 METHOD_FAILURE
            - 421 DESTINATION_LOCKED
            - 422 UNPROCESSABLE_ENTITY
            - 423 LOCKED
            - 424 FAILED_DEPENDENCY
            - 425 TOO_EARLY
            - 426 UPGRADE_REQUIRED
            - 428 PRECONDITION_REQUIRED
            - 429 TOO_MANY_REQUESTS
            - 431 REQUEST_HEADER_FIELDS_TOO_LARGE
            - 451 UNAVAILABLE_FOR_LEGAL_REASONS
            - 500 INTERNAL_SERVER_ERROR
            - 501 NOT_IMPLEMENTED
            - 502 BAD_GATEWAY
            - 503 SERVICE_UNAVAILABLE
            - 504 GATEWAY_TIMEOUT
            - 505 HTTP_VERSION_NOT_SUPPORTED
            - 506 VARIANT_ALSO_NEGOTIATES
            - 507 INSUFFICIENT_STORAGE
            - 508 LOOP_DETECTED
            - 509 BANDWIDTH_LIMIT_EXCEEDED
            - 510 NOT_EXTENDED
            - 511 NETWORK_AUTHENTICATION_REQUIRED
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
        message:
          type: string
        detailedMessage:
          type: string
        validationErrors:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/NestedError'
    NestedError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        reason:
          type: string
        suggestion:
          type: string
    QoSProfileAssignment:
      type: object
      properties:
        unitIds:
          type: array
          description: The identifier of the metering profile.
          items:
            type: string
            format: uuid
          minItems: 1
        profileExpiry:
          type: string
          format: date-time
          description: The expiration date for the metering profile.
      required:
        - profileExpiry
        - unitIds
    AcceptedResponse:
      type: object
      properties:
        requestId:
          type: string
    Address:
      type: object
      properties:
        country:
          type: string
          description: Venue country.
        city:
          type: string
          description: Venue city.
        addressLine:
          type: string
      required:
        - city
        - country
    CommunicationConfigDto:
      type: object
      properties:
        type:
          type: string
        sendEmail:
          type: boolean
          description: Enable email communication.
        sendSms:
          type: boolean
          description: Enable SMS communication.
        notifyOnUnitSuspend:
          type: boolean
          description: Notify on unit suspend.
        unitAssignmentHtmlRegId:
          type: string
          description: Unit assignment hyper text template.
        unitAssignmentTextRegId:
          type: string
          description: Unit assignment text template.
        unitPassphraseChangeHtmlRegId:
          type: string
          description: Unit passphrase change hyper text template.
        unitPassphraseChangeTextRegId:
          type: string
          description: Unit passphrase change text template.
        guestPassphraseChangeHtmlRegId:
          type: string
          description: Guest passphrase change hyper text template.
        guestPassphraseChangeTextRegId:
          type: string
          description: Guest passphrase change text template.
        portalAccessResetHtmlRegId:
          type: string
          description: Portal access reset hyper text template.
        portalAccessResetTextRegId:
          type: string
          description: Portal access reset text template.
        portAssignmentHtmlRegId:
          type: string
          description: Port assignment hyper text template.
        portAssignmentTextRegId:
          type: string
          description: Port assignment text template.
        unitSuspendHtmlRegId:
          type: string
          description: Unit suspend hyper text template.
        unitSuspendTextRegId:
          type: string
          description: Unit suspend text template.
        unitUserSuspendHtmlRegId:
          type: string
          description: Unit user suspend hyper text template.
        unitUserSuspendTextRegId:
          type: string
          description: Unit user suspend text template.
        unitReactivateHtmlRegId:
          type: string
          description: Unit reactivate hyper text template.
        unitReactivateTextRegId:
          type: string
          description: Unit reactivate text template.
        unitUserReactivateHtmlRegId:
          type: string
          description: Unit user reactivate hyper text template.
        unitUserReactivateTextRegId:
          type: string
          description: Unit user reactivate text template.
    PropertyDto:
      type: object
      properties:
        venueId:
          type: string
        venueName:
          type: string
          description: Venue name.
        address:
          $ref: '#/components/schemas/Address'
          description: Venue address.
        description:
          type: string
        venue:
          description: Property venue.
        personaGroupId:
          type: string
          description: Persona group identifier.
        residentPortalId:
          type: string
          format: uuid
          deprecated: true
          description: Resident portal identifier.
        status:
          type: string
          default: DISABLED
          description: Status of the property
          enum:
            - DISABLED
            - ENABLED
        unitConfig:
          $ref: '#/components/schemas/UnitConfigDto'
          description: Basic configuration on property units.
        communicationConfig:
          $ref: '#/components/schemas/CommunicationConfigDto'
          description: Configuration for communicating unit change events.
      required:
        - personaGroupId
        - status
        - venue
        - venueName
    UnitConfigDto:
      type: object
      properties:
        type:
          type: string
        residentPortalAllowed:
          type: boolean
          description: Allow resident portal.
        residentApiAllowed:
          type: boolean
          description: Allow resident portal API.
        useMaxUnitCount:
          type: boolean
          description: Restrict unit count.
        maxUnitCount:
          type: integer
          format: int32
          description: Maximum allowed unit count.
        guestAllowed:
          type: boolean
          description: Allow separate guest for the unit.
    EntityModelAcceptedResponse:
      type: object
      properties:
        requestId:
          type: string
        _links:
          $ref: '#/components/schemas/Links'
    PropertyResidentPortalAssignment:
      type: object
      properties:
        venueId:
          type: string
          description: Resident portal identifier.
        residentPortalId:
          type: string
          format: uuid
          description: Resident portal identifier.
    DpskSettings:
      type: object
      properties:
        type:
          type: string
          enum:
            - UNIT
            - GUEST
            - LINKED
        passphrase:
          type: string
          description: >-
            Maximum length for passphrase is 63. Minimum passphrase length is
            configured for individual DPSK services.
          maxLength: 63
          minLength: 0
        vlan:
          type: integer
          format: int32
          maximum: 4094
          minimum: 1
      required:
        - type
    LanPort:
      type: object
      properties:
        macAddress:
          type: string
          description: The MAC address of the port.
          pattern: >-
            ^([0-9A-Fa-f]{2}-){5}([0-9A-Fa-f]{2})$|^([0-9A-Fa-f]{2}:){5}([0-9A-Fa-f]{2})$|^([0-9A-Fa-f]{6})-([0-9A-Fa-f]{6})$|^([0-9A-Fa-f]{4}[.]){2}([0-9A-Fa-f]{4})$|^[0-9A-Fa-f]{12}$
        portIndex:
          type: integer
          format: int32
          description: The index of the port.
      required:
        - macAddress
        - portIndex
    Resident:
      type: object
      properties:
        name:
          type: string
          description: Resident name.
          maxLength: 255
          minLength: 0
        email:
          type: string
          description: Resident email.
          maxLength: 255
          minLength: 0
        phoneNumber:
          type: string
          description: Resident phone number.
          maxLength: 16
          minLength: 0
      required:
        - name
    TrafficControl:
      type: object
      properties:
        meteringProfileId:
          type: string
          description: The identifier of the metering profile.
          minLength: 1
        profileExpiry:
          type: string
          format: date-time
          description: The expiration date for the metering profile.
      required:
        - meteringProfileId
        - profileExpiry
    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Unit name.
          maxLength: 235
          minLength: 0
        resident:
          $ref: '#/components/schemas/Resident'
          description: Resident contact details.
        status:
          type: string
          description: Unit status.
          enum:
            - DISABLED
            - ENABLED
        dpsks:
          type: array
          description: DPSK details.
          items:
            $ref: '#/components/schemas/DpskSettings'
          maxItems: 2
          minItems: 0
        accessPoint:
          $ref: '#/components/schemas/UnitAp'
          description: Access point details.
        trafficControl:
          $ref: '#/components/schemas/TrafficControl'
          description: Traffic control profile details.
        personaId:
          type: string
          format: uuid
        guestPersonaId:
          type: string
          format: uuid
        identityCount:
          type: integer
          format: int64
          description: Count of associated identities
          readOnly: true
      required:
        - name
        - resident
    UnitAp:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        selectedPorts:
          type: array
          description: The list of selected ports.
          items:
            $ref: '#/components/schemas/LanPort'
      required:
        - name
    QueryData:
      type: object
      properties:
        fields:
          type: array
          description: Fields to select.
          items:
            type: string
        sortField:
          type: string
          description: Sort field.
        keyword:
          type: string
          description: Search keyword.
        sortOrder:
          type: string
          description: Sorting direction.
          enum:
            - ASC
            - DESC
        page:
          type: integer
          format: int32
          description: Page number.
        pageSize:
          type: integer
          format: int32
          description: Number of pages.
        filters:
          type: object
          additionalProperties: {}
          description: Filter names and its values as filter.
      required:
        - page
        - pageSize
        - sortOrder
    EntityModelUnit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Unit name.
          maxLength: 235
          minLength: 0
        resident:
          $ref: '#/components/schemas/Resident'
          description: Resident contact details.
        status:
          type: string
          description: Unit status.
          enum:
            - DISABLED
            - ENABLED
        dpsks:
          type: array
          description: DPSK details.
          items:
            $ref: '#/components/schemas/DpskSettings'
          maxItems: 2
          minItems: 0
        accessPoint:
          $ref: '#/components/schemas/UnitAp'
          description: Access point details.
        trafficControl:
          $ref: '#/components/schemas/TrafficControl'
          description: Traffic control profile details.
        personaId:
          type: string
          format: uuid
        guestPersonaId:
          type: string
          format: uuid
        identityCount:
          type: integer
          format: int64
          description: Count of associated identities
          readOnly: true
        _links:
          $ref: '#/components/schemas/Links'
      required:
        - name
        - resident
    PageEntityModelUnit:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/EntityModelUnit'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
        offset:
          type: integer
          format: int64
        sort:
          $ref: '#/components/schemas/SortObject'
    SortObject:
      type: object
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
    EntityModelPersona:
      type: object
      properties:
        unitId:
          type: string
          format: uuid
        personaType:
          type: string
          enum:
            - UNIT
            - GUEST
            - LINKED
        personaId:
          type: string
          format: uuid
        _links:
          $ref: '#/components/schemas/Links'
      required:
        - personaId
        - personaType
        - unitId
    PageEntityModelPersona:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/EntityModelPersona'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        empty:
          type: boolean
    Page:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        size:
          type: integer
          format: int32
        content:
          type: array
          items: {}
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        empty:
          type: boolean
    ResidentPortal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Resident portal name.
          minLength: 1
        description:
          type: string
          description: Resident portal description.
        portalStatus:
          type: string
          description: Resident portal status.
          enum:
            - DISABLED
            - ENABLED
        venueCount:
          type: integer
          format: int64
          description: Number of venues using this resident portal.
          readOnly: true
        uiConfiguration:
          description: Resident portal configurations.
          oneOf:
            - $ref: '#/components/schemas/ResidentPortalUiConfigs'
      required:
        - name
        - uiConfiguration
    ResidentPortalAccessConfig:
      type: object
      properties:
        tenantSetDpsk:
          type: boolean
    ResidentPortalColorConfig:
      type: object
      properties:
        mainColor:
          type: string
          pattern: ^$|^#(?:[0-9a-fA-F]{3}){1,2}$|^(?:[0-9a-fA-F]{3}){1,2}$
        accentColor:
          type: string
          pattern: ^$|^#(?:[0-9a-fA-F]{3}){1,2}$|^(?:[0-9a-fA-F]{3}){1,2}$
        separatorColor:
          type: string
          pattern: ^$|^#(?:[0-9a-fA-F]{3}){1,2}$|^(?:[0-9a-fA-F]{3}){1,2}$
        textColor:
          type: string
          pattern: ^$|^#(?:[0-9a-fA-F]{3}){1,2}$|^(?:[0-9a-fA-F]{3}){1,2}$
    ResidentPortalConfig:
      type: object
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
    ResidentPortalFileConfig:
      type: object
      properties:
        logoFileName:
          type: string
          maxLength: 52
          minLength: 0
        favIconFileName:
          type: string
          maxLength: 52
          minLength: 0
    ResidentPortalTextConfig:
      type: object
      properties:
        loginText:
          type: string
          maxLength: 52
          minLength: 0
        title:
          type: string
          maxLength: 52
          minLength: 0
        subTitle:
          type: string
          maxLength: 52
          minLength: 0
        announcements:
          type: string
          maxLength: 5000
          minLength: 0
        helpText:
          type: string
          maxLength: 5000
          minLength: 0
    ResidentPortalUiConfigs:
      allOf:
        - $ref: '#/components/schemas/ResidentPortalConfig'
        - type: object
          properties:
            access:
              $ref: '#/components/schemas/ResidentPortalAccessConfig'
            color:
              $ref: '#/components/schemas/ResidentPortalColorConfig'
            files:
              $ref: '#/components/schemas/ResidentPortalFileConfig'
            text:
              $ref: '#/components/schemas/ResidentPortalTextConfig'
    EntityModelResidentPortal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Resident portal name.
          minLength: 1
        description:
          type: string
          description: Resident portal description.
        portalStatus:
          type: string
          description: Resident portal status.
          enum:
            - DISABLED
            - ENABLED
        venueCount:
          type: integer
          format: int64
          description: Number of venues using this resident portal.
          readOnly: true
        uiConfiguration:
          description: Resident portal configurations.
          oneOf:
            - $ref: '#/components/schemas/ResidentPortalUiConfigs'
        _links:
          $ref: '#/components/schemas/Links'
      required:
