    post:
      tags:
        - Policies
      summary: Create Policy
      description: >-
        Creates a policy from the requested values, and based on the specified
        parent. If the content type of
        "application/ruckus.one.v1-synchronous+json" is provided, than the
        method will be asynchronous, and will return only once it has correctly
        associated with the requested radius attribute group. Otherwise it is
        asynchronous, and must be looked up by id to be complete. 
      operationId: createPolicy
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/Policy'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/ruckus.one.v1-synchronous+json:
              schema:
                $ref: '#/components/schemas/Policy'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Policy'
        '409':
          description: Invalid policy details provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
