            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy Condition'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Policy Condition'
        '404':
          description: ' Not Found.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    delete:
      tags:
        - Policy Conditions
      summary: Delete Conditions
      description: >-
        Deletes the condition from the specified policy, but only if at least
        one condition still exists.
      operationId: deletePolicyConditions
      parameters:
        - name: templateId
          in: path
          description: Policy Template identifier.
          required: true
          schema:
            type: integer
            format: int64
        - name: policyId
          in: path
          description: Policy identifier.
          required: true
          schema:
            type: string
            format: uuid
        - name: conditionId
          in: path
          description: Condition identifier.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Condition deleted successfully.
          content:
            application/json:
              schema:
                type: object
                description: Empty response object for successful deletion
            application/vnd.ruckus.v1+json:
              schema:
                type: object
                description: Empty response object for successful deletion
        '204':
          description: Condition deleted, no content.
          content:
            application/json:
              schema:
                type: object
                description: No content
            application/vnd.ruckus.v1+json:
              schema:
                type: object
                description: No content
        '404':
          description: Policy or template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
        '409':
          description: Policy will not have any conditions if this is deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    patch:
