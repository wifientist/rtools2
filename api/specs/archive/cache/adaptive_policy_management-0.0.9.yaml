        - identityName
      type: object
      properties:
        id:
          type: string
          description: The identifier for this assignment.
          format: uuid
        identityId:
          type: string
          description: >-
            The unique identifier for the identity that is assigned to this
            policy set.
        identityName:
          type: string
          description: The identity name that is assigned to this policy set.
        _links:
          $ref: '#/components/schemas/Links'
      description: An assignment that has been made to a policy set.
    PagedResponseResourcePolicy Set:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Page Data'
        content:
          type: array
          description: The content list of the data.
          items:
            $ref: '#/components/schemas/Policy Set'
        _links:
          $ref: '#/components/schemas/Links'
      description: A paged response containing a list of items with pagination metadata.
    Policy Update:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: The name of the policy. Must be unique within the tenant.
        description:
          type: string
          description: The policy description.
        onMatchResponse:
          type: string
          description: >-
            The response details if the policy is matched. For policy types
