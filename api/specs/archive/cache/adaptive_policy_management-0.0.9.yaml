components:
  schemas:
    Links:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/Link'
    Prioritized Policy:
      type: object
      properties:
        policyId:
          type: string
          description: >-
            The identifier for the prioritized policy. Will be ignored on a put,
            as URL is the identifier.
          format: uuid
        priority:
          type: integer
          description: The priority of this policy, 1 being the highest priority.
          format: int32
        _links:
          $ref: '#/components/schemas/Links'
      description: The prioritized policy assignment details.
    ErrorResource:
      type: object
      properties:
        requestId:
          type: string
          description: Unique identifier for the request that generated this error.
        status:
          type: string
          description: HTTP status code of the error response.
          enum:
            - 100 CONTINUE
            - 101 SWITCHING_PROTOCOLS
            - 102 PROCESSING
            - 103 EARLY_HINTS
            - 103 CHECKPOINT
            - 200 OK
            - 201 CREATED
            - 202 ACCEPTED
            - 203 NON_AUTHORITATIVE_INFORMATION
            - 204 NO_CONTENT
            - 205 RESET_CONTENT
            - 206 PARTIAL_CONTENT
            - 207 MULTI_STATUS
            - 208 ALREADY_REPORTED
            - 226 IM_USED
            - 300 MULTIPLE_CHOICES
            - 301 MOVED_PERMANENTLY
            - 302 FOUND
            - 302 MOVED_TEMPORARILY
            - 303 SEE_OTHER
            - 304 NOT_MODIFIED
            - 305 USE_PROXY
            - 307 TEMPORARY_REDIRECT
            - 308 PERMANENT_REDIRECT
            - 400 BAD_REQUEST
            - 401 UNAUTHORIZED
            - 402 PAYMENT_REQUIRED
            - 403 FORBIDDEN
            - 404 NOT_FOUND
            - 405 METHOD_NOT_ALLOWED
            - 406 NOT_ACCEPTABLE
            - 407 PROXY_AUTHENTICATION_REQUIRED
            - 408 REQUEST_TIMEOUT
            - 409 CONFLICT
            - 410 GONE
            - 411 LENGTH_REQUIRED
            - 412 PRECONDITION_FAILED
            - 413 PAYLOAD_TOO_LARGE
            - 413 REQUEST_ENTITY_TOO_LARGE
            - 414 URI_TOO_LONG
            - 414 REQUEST_URI_TOO_LONG
            - 415 UNSUPPORTED_MEDIA_TYPE
            - 416 REQUESTED_RANGE_NOT_SATISFIABLE
            - 417 EXPECTATION_FAILED
            - 418 I_AM_A_TEAPOT
            - 419 INSUFFICIENT_SPACE_ON_RESOURCE
            - 420 METHOD_FAILURE
            - 421 DESTINATION_LOCKED
            - 422 UNPROCESSABLE_ENTITY
            - 423 LOCKED
            - 424 FAILED_DEPENDENCY
            - 425 TOO_EARLY
            - 426 UPGRADE_REQUIRED
            - 428 PRECONDITION_REQUIRED
            - 429 TOO_MANY_REQUESTS
            - 431 REQUEST_HEADER_FIELDS_TOO_LARGE
            - 451 UNAVAILABLE_FOR_LEGAL_REASONS
            - 500 INTERNAL_SERVER_ERROR
            - 501 NOT_IMPLEMENTED
            - 502 BAD_GATEWAY
            - 503 SERVICE_UNAVAILABLE
            - 504 GATEWAY_TIMEOUT
            - 505 HTTP_VERSION_NOT_SUPPORTED
            - 506 VARIANT_ALSO_NEGOTIATES
            - 507 INSUFFICIENT_STORAGE
            - 508 LOOP_DETECTED
            - 509 BANDWIDTH_LIMIT_EXCEEDED
            - 510 NOT_EXTENDED
            - 511 NETWORK_AUTHENTICATION_REQUIRED
        timestamp:
          type: string
          description: Timestamp when the error occurred.
          format: date-time
        message:
          type: string
          description: Human-readable error message for end users.
        debugMessage:
          type: string
          description: Detailed error message for debugging purposes.
        nestedErrors:
          type: array
          description: List of validation errors and constraint violations.
          items:
            $ref: '#/components/schemas/RestErrorDetails'
        errors:
          type: array
          description: List of user-friendly error messages with codes and suggestions.
          items:
            $ref: '#/components/schemas/UxNestedError'
      description: >-
        Standard error response containing error details, validation errors, and
        debugging information.
    RestErrorDetails:
      type: object
      description: Base class for error details containing common error information.
    UxNestedError:
      type: object
      properties:
        code:
          type: string
          description: Error code identifier for programmatic error handling.
        message:
          type: string
          description: Human-readable error message for end users.
        reason:
          type: string
          description: Explanation of why the error occurred.
        suggestion:
          type: string
          description: Optional suggestion for resolving the error.
      description: >-
        User-friendly error message with code, message, reason, and optional
        suggestion.
    Policy:
      required:
        - name
        - policyType
      type: object
      properties:
        id:
          type: string
          description: The identifier for this dynamic policy.
          format: uuid
        name:
          type: string
          description: The name of the policy.
        description:
          type: string
          description: The policy description.
        policyType:
          type: string
          description: >-
            The data type for this attribute text. EX:  it identifies which type
            of value the test data will be. This cannot be changed, and will be
            matched with the policy template for this policy type. It cannot be
            changed.
          enum:
            - RADIUS
            - DPSK
        onMatchResponse:
          type: string
          description: >-
            The response details if the policy is matched. For policy types
            which are RADIUS and DPSK, this is expected to be the identifier of
            a valid RADIUS attribute group.
        policySetCount:
          type: integer
          description: The number of policy sets that this policy is assigned to.
          format: int64
        conditionsCount:
          type: integer
          description: The number of conditions that are used when evaluating this policy.
          format: int64
        policySetNames:
          type: array
          description: >-
            The names of the policy sets that this policy is currently assigned
            to.
          items:
            type: string
            description: >-
              The names of the policy sets that this policy is currently
              assigned to.
        _links:
          $ref: '#/components/schemas/Links'
      description: A policy definition, based on the parent policy template.
    BooleanCriteria:
      required:
        - booleanCriteria
      type: object
      description: A boolean condition to evaluate, will use equals.
      allOf:
        - $ref: '#/components/schemas/Evaluation Criteria'
        - type: object
          properties:
            booleanCriteria:
              type: boolean
              description: The boolean value requested to be used in equals evaluation.
    DateRangeCriteria:
      required:
        - endTime
        - startTime
        - when
        - zoneOffset
      type: object
      description: DateRangeCriteria for conditions evaluation.
      allOf:
        - $ref: '#/components/schemas/Evaluation Criteria'
        - type: object
          properties:
            when:
              type: string
              description: Defines when in a week the policy condition is valid
              enum:
                - All
                - Weekend
                - Weekdays
            startTime:
              $ref: '#/components/schemas/LocalTime'
            endTime:
              $ref: '#/components/schemas/LocalTime'
            zoneOffset:
              type: string
              description: >-
                The time zone offset to apply for evaluation. This needs to be a
                valid timezone. If null, or invalid, will default to UTC.
    Dynamic Policy Template Attribute:
      required:
        - attributeType
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          description: The identifier for this dynamic policy template attribute.
          format: int64
        name:
          type: string
          description: The policy attribute name.
        description:
          type: string
          description: The description for this policy template.
        attributeTextMatch:
          type: string
          description: >-
            The attribute value that is use match the value provided in the
            policy.
        attributeType:
          type: string
          description: >-
            The data type for this attribute text. EX:  it identifies which type
            of value the test data will be.
          enum:
            - STRING
            - NUMBER
            - BOOLEAN
            - DATE_RANGE
        category:
          type: string
          description: The category for this attribute.
        _links:
          $ref: '#/components/schemas/Links'
      description: Attribute that is allowed to be assigned on a policy using the template.
    Evaluation Criteria:
      required:
        - criteriaType
      type: object
      properties:
        criteriaType:
          type: string
      description: >-
        Base class for evaluation criteria used in policy conditions. Supports
        different types of criteria including boolean, number, string regex, and
        date range evaluations.
      discriminator:
        propertyName: criteriaType
      oneOf:
        - $ref: '#/components/schemas/BooleanCriteria'
        - $ref: '#/components/schemas/DateRangeCriteria'
        - $ref: '#/components/schemas/NumberCriteria'
        - $ref: '#/components/schemas/StringCriteria'
    LocalTime:
      type: object
      properties:
        hour:
          type: integer
          format: int32
        minute:
          type: integer
          format: int32
        second:
          type: integer
          format: int32
        nano:
          type: integer
          format: int32
      description: The end time for this date range.
    NumberCriteria:
      required:
        - numberCriteria
      type: object
      description: Number criteria for evaluation, the numbers must be equal.
      allOf:
        - $ref: '#/components/schemas/Evaluation Criteria'
        - type: object
          properties:
            numberCriteria:
              type: number
              description: The number to be used with equals evaluation.
    Policy Condition:
      required:
        - policyId
        - templateAttributeId
      type: object
      properties:
        id:
          type: string
          description: The identifier for this policy condition.
          format: uuid
        policyId:
          type: string
          description: The identifier of the policy to assign this condition.
          format: uuid
        templateAttributeId:
          type: integer
          description: >-
            The identifier for the template attribute to associate with this
            condition.
          format: int64
        templateAttribute:
          $ref: '#/components/schemas/Dynamic Policy Template Attribute'
        evaluationRule:
          $ref: '#/components/schemas/Evaluation Criteria'
        _links:
          $ref: '#/components/schemas/Links'
      description: Condition that will be used when evaluating this policy.
    StringCriteria:
      required:
        - regexStringCriteria
      type: object
      description: String regular expression for conditions evaluation.
      allOf:
        - $ref: '#/components/schemas/Evaluation Criteria'
        - type: object
          properties:
            regexStringCriteria:
              maxLength: 255
              minLength: 0
              type: string
              description: The regex string to use in evaluation.
    Query Data:
      type: object
      properties:
        sortField:
          type: string
          description: The field to use to sort on.
        sortOrder:
          type: string
          description: Defines the sort direction for query results.
          enum:
            - ASC
            - DESC
        page:
          minimum: 0
          type: integer
          description: The page number to return, paging starts with 0.
          format: int32
        pageSize:
          maximum: 2000
          minimum: 1
          type: integer
          description: The number of items requested on the page.
          format: int32
        filters:
          type: object
          additionalProperties:
            type: object
            description: The list of filters to apply.
          description: The list of filters to apply.
      description: Data for the requested query.
    Page Data:
      type: object
      properties:
        totalCount:
          type: integer
          description: The total count of items.
          format: int64
        page:
          type: integer
          description: The page number requested, starting with 0.
          format: int32
        pageSize:
          type: integer
          description: The number of items on this page.
          format: int32
        pageCount:
          type: integer
          description: The total number of pages available.
          format: int32
      description: >-
        Pagination metadata for query results including total count, current
        page, page size, and total pages
    PagedResponseResourcePolicy:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Page Data'
        content:
          type: array
          description: The content list of the data.
          items:
            $ref: '#/components/schemas/Policy'
        _links:
          $ref: '#/components/schemas/Links'
      description: A paged response containing a list of items with pagination metadata.
    PagedResponseResourceDynamic Policy Template Attribute:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Page Data'
        content:
          type: array
          description: The content list of the data.
          items:
            $ref: '#/components/schemas/Dynamic Policy Template Attribute'
        _links:
          $ref: '#/components/schemas/Links'
      description: A paged response containing a list of items with pagination metadata.
    Dynamic Policy Template:
      required:
        - id
        - name
        - returnType
        - ruleType
      type: object
      properties:
        id:
          type: integer
          description: The identifier for this dynamic policy template.
          format: int64
        name:
          type: string
          description: The policy template name.
        description:
          type: string
          description: The policy template description.
        returnType:
          type: string
          description: The allowed return type for this dynamic policy template.
          enum:
            - RADIUS_ATTRIB_GROUP
        ruleType:
          type: string
          description: The allowed rule type for this dynamic policy template.
          enum:
            - RADIUS
            - DPSK
        _links:
          $ref: '#/components/schemas/Links'
      description: Dynamic Policy Template
    PagedResponseResourceDynamic Policy Template:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Page Data'
        content:
          type: array
          description: The content list of the data.
          items:
            $ref: '#/components/schemas/Dynamic Policy Template'
        _links:
          $ref: '#/components/schemas/Links'
      description: A paged response containing a list of items with pagination metadata.
    Policy Set:
      required:
        - description
        - name
      type: object
      properties:
        id:
          type: string
          description: The identifier for this dynamic policy.
          format: uuid
        name:
          type: string
          description: The policy set name.
        description:
          type: string
          description: The policy set description.
        mappedPolicyCount:
          type: integer
          description: The number of policies mapped to this policy set.
          format: int64
        assignmentCount:
          type: integer
          description: The number of assignments to this policy set.
          format: int64
        policyNames:
          type: array
          description: The names of the policies mapped to this policy set.
          items:
            type: string
            description: The names of the policies mapped to this policy set.
        externalAssignments:
          type: array
          description: The list of external assignments assigned to this policy set.
          items:
            $ref: '#/components/schemas/Policy Set Assignment Groups'
        policyOverrideEnabled:
          type: boolean
          description: The policy override enabled flag.
        _links:
          $ref: '#/components/schemas/Links'
      description: >-
        A map contains the properties and values to be updated from the policy
        set resource.
    Policy Set Assignment Groups:
      required:
        - identityId
        - identityName
      type: object
      properties:
        identityName:
          type: string
          description: >-
            The identity name for the service which is mapped to this
            assignment.
        identityId:
          type: array
          description: >-
            The list of identities that are mapped to the identity name and
            assigned to this policy set.
          items:
            type: string
            description: >-
              The list of identities that are mapped to the identity name and
              assigned to this policy set.
        _links:
          $ref: '#/components/schemas/Links'
      description: >-
        The external assignments to the policy set per identity name. Each
        service provides an identity name, so it is possible to determine the
        resource references the policy set in that specific service.
    PagedResponseResourcePolicy Set Assignment:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Page Data'
        content:
          type: array
          description: The content list of the data.
          items:
            $ref: '#/components/schemas/Policy Set Assignment'
        _links:
          $ref: '#/components/schemas/Links'
      description: A paged response containing a list of items with pagination metadata.
    Policy Set Assignment:
      required:
        - id
