openapi: 3.0.1
info:
  title: Adaptive Policy Management
  description: >-
    # Overview


    The Adaptive Policy Management REST APIs and Model, allow the creation,
    deletion, and modification of policies, policy sets, and assigning policies
    to policy sets.  All policies must be inherited from a policy template. 
    Only those evaluation conditions that are defined for the template can be
    assigned to the policy. Once a policy is assigned to a policy set, it must
    be given an evaluation priority. If the priority is changed, or a policy
    added or removed, the priority of the other policies will be automatically
    re-ordered.


    ## What This API Does

    - Create, modify, and delete policies

    - Manage policy sets and assignments

    - Configure policy templates and evaluation conditions

    - Set and manage policy priorities


    ## Authentication

    All API calls require valid authentication via Bearer token in Authorization
    header.


    ## Error Handling

    The API uses standard HTTP status codes with detailed error messages in the
    response body.


    ## Common Error Responses

    All endpoints may return these common error responses:

    - **400 Bad Request**: Invalid input data or validation errors

    - **401 Unauthorized**: Missing or invalid authentication

    - **403 Forbidden**: Insufficient permissions

    - **404 Not Found**: Requested resource doesn't exist

    - **409 Conflict**: Resource conflict (e.g., duplicate names)

    - **422 Unprocessable Entity**: Business rule violations

    - **500 Internal Server Error**: Unexpected server errors
  license:
    name: RUCKUS Cloud Privacy Policy
    url: https://support.ruckuswireless.com/ruckus-cloud-privacy-policy
  version: 0.0.9
servers:
  - url: https://api.ruckus.cloud
    description: RUCKUS One API host for North American region.
  - url: https://api.eu.ruckus.cloud
    description: RUCKUS One API host for European region.
  - url: https://api.asia.ruckus.cloud
    description: RUCKUS One API host for Asian region.
tags:
  - name: Policy Conditions
    description: Manage the conditions that are applied on the specified policy.
  - name: Policy Set Assignments
    description: Manage the assignments of policy sets to identities.
  - name: Policy Templates
    description: View the list of policy templates.
  - name: Policies
    description: Manages, create and get of policies assigned to a specific template.
  - name: Prioritized Policies
    description: Manage the prioritized policies within a policy set.
  - name: Policy Sets
    description: Manages the policy sets.
paths:
  /policySets/{policySetId}/prioritizedPolicies/{policyId}:
    get:
      tags:
        - Prioritized Policies
      summary: Get Prioritized Policy
      description: Retrieves the requested prioritized policy.
      operationId: getPrioritizedRuleById
      parameters:
        - name: policySetId
          in: path
          description: Policy set identifier.
          required: true
          schema:
            type: string
            format: uuid
        - name: policyId
          in: path
          description: Policy identifier.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prioritized policy found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prioritized Policy'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Prioritized Policy'
        '404':
          description: Policy set or policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    put:
      tags:
        - Prioritized Policies
      summary: Assign Policy to Policy Set
      description: Assigns a policy to a policy set with a specific priority.
      operationId: assignPolicyToPolicySetWithPriority
      parameters:
        - name: policySetId
          in: path
          description: Policy set identifier.
          required: true
          schema:
            type: string
            format: uuid
        - name: policyId
          in: path
          description: Policy identifier.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prioritized Policy'
          application/vnd.ruckus.v1+json:
            schema:
              $ref: '#/components/schemas/Prioritized Policy'
        required: true
      responses:
        '201':
          description: Policy assigned to policy set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prioritized Policy'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/Prioritized Policy'
        '409':
          description: Invalid assignment details provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
    delete:
      tags:
        - Prioritized Policies
      summary: Remove Policy from Policy Set
      description: Removes a policy from a policy set.
      operationId: removeMappedPolicySet
      parameters:
        - name: policySetId
          in: path
          description: Policy set identifier.
          required: true
          schema:
            type: string
            format: uuid
        - name: policyId
          in: path
          description: Policy identifier.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy removed from policy set successfully.
          content:
            application/json:
              schema:
                type: object
                description: Empty response object for successful removal
            application/vnd.ruckus.v1+json:
              schema:
                type: object
                description: Empty response object for successful removal
        '204':
          description: Policy removed from policy set, no content.
          content:
            application/json:
              schema:
                type: object
                description: No content
            application/vnd.ruckus.v1+json:
              schema:
                type: object
                description: No content
        '404':
          description: Policy set or policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
            application/vnd.ruckus.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorResource'
